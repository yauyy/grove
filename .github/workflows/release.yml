name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: grove-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            name: grove-aarch64-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: grove-x86_64-pc-windows-msvc
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: grove-x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz grove
          cd ../../..

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip grove.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Calculate SHA256 and version
        id: info
        run: |
          echo "aarch64_apple=$(sha256sum artifacts/grove-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_apple=$(sha256sum artifacts/grove-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=$(sha256sum artifacts/grove-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          SHA_AARCH64="${{ steps.info.outputs.aarch64_apple }}"
          SHA_X86_64_APPLE="${{ steps.info.outputs.x86_64_apple }}"
          SHA_X86_64_LINUX="${{ steps.info.outputs.x86_64_linux }}"
          cat > grove.rb << 'FORMULA'
          class Grove < Formula
            desc "Multi-project git worktree workspace manager"
            homepage "https://github.com/yauyy/grove"
            version "__VERSION__"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/yauyy/grove/releases/download/v#{version}/grove-aarch64-apple-darwin.tar.gz"
                sha256 "__SHA_AARCH64__"
              else
                url "https://github.com/yauyy/grove/releases/download/v#{version}/grove-x86_64-apple-darwin.tar.gz"
                sha256 "__SHA_X86_64_APPLE__"
              end
            end

            on_linux do
              url "https://github.com/yauyy/grove/releases/download/v#{version}/grove-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "__SHA_X86_64_LINUX__"
            end

            def install
              bin.install "grove"
            end

            test do
              assert_match "Multi-project git worktree workspace manager", shell_output("#{bin}/grove --help")
            end
          end
          FORMULA
          sed -i 's/^          //' grove.rb
          sed -i "s/__VERSION__/${VERSION}/" grove.rb
          sed -i "s/__SHA_AARCH64__/${SHA_AARCH64}/" grove.rb
          sed -i "s/__SHA_X86_64_APPLE__/${SHA_X86_64_APPLE}/" grove.rb
          sed -i "s/__SHA_X86_64_LINUX__/${SHA_X86_64_LINUX}/" grove.rb

      - name: Push to homebrew-grove
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/yauyy/homebrew-grove.git
          cp grove.rb homebrew-grove/grove.rb
          cd homebrew-grove
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add grove.rb
          git commit -m "update grove to v${{ steps.info.outputs.version }}"
          git push

      - name: Sync formula to main repo
        uses: actions/checkout@v4
        with:
          ref: master
          path: main-repo

      - name: Push formula to main repo
        run: |
          cp grove.rb main-repo/Formula/grove.rb
          cd main-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/grove.rb
          git diff --cached --quiet || (git commit -m "chore: update Formula sha256 for v${{ steps.info.outputs.version }}" && git push)
